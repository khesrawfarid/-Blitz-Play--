<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>    
  </defs>

  <rect width="512" height="512" rx="100" fill="#0b0f1a"/>
  
  <g transform="translate(130, 100)" filter="url(#glow)">
    <path d="M 0 0 L 260 150 L 0 300 Z" fill="url(#primaryGrad)" />
  </g>
  
  <g transform="translate(200, 50)" filter="url(#glow)">
    <path d="M 120 0 L 0 250 L 80 250 L 20 400 L 160 150 L 80 150 Z" fill="url(#accentGrad)" />
  </g>
</svg>
