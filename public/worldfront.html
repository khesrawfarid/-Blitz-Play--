<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldFront</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f172a; /* Slate 900 */
      background-image: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }
    #map-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .edge {
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 2px;
      stroke-dasharray: 4, 4;
    }
    .node {
      cursor: pointer;
      transition: all 0.2s;
    }
    .node circle {
      stroke: #fff;
      stroke-width: 2px;
      transition: all 0.2s;
    }
    .node:hover circle {
      stroke-width: 4px;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
    }
    .node.selected circle {
      stroke-width: 5px;
      stroke: #facc15;
      filter: drop-shadow(0 0 12px rgba(250,204,21,1));
    }
    .troop-text {
      font-size: 14px;
      font-weight: 900;
      fill: white;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
      text-shadow: 0px 0px 4px #000, 0px 0px 4px #000, 0px 0px 4px #000;
    }
    .name-text {
      font-size: 10px;
      font-weight: bold;
      fill: rgba(255, 255, 255, 0.7);
      text-anchor: middle;
      pointer-events: none;
      text-shadow: 0px 0px 2px #000;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      z-index: 10;
    }
    .panel {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid #3b82f6;
      padding: 15px 25px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }
    h1 { margin: 0 0 5px 0; font-size: 24px; color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
    p { margin: 0; font-size: 16px; font-weight: bold; }
    
    #gameover {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 23, 42, 0.95);
      border: 2px solid #facc15;
      padding: 40px 60px;
      border-radius: 24px;
      text-align: center;
      display: none;
      box-shadow: 0 0 50px rgba(250, 204, 21, 0.3);
      z-index: 20;
    }
    #gameover h2 { font-size: 48px; margin: 0 0 20px 0; }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: all 0.2s;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
    
    /* Map Background Image */
    #world-map-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div class="panel">
      <h1>WorldFront</h1>
      <p id="stats" style="color: #94a3b8;">Länder: 0 | Truppen: 0</p>
      <p style="font-size: 12px; color: #64748b; margin-top: 8px;">Klicke dein Land (Blau) -> Klicke Ziel</p>
    </div>
  </div>

  <div id="gameover">
    <h2 id="resultText">Sieg!</h2>
    <button onclick="location.reload()">Neues Spiel</button>
  </div>

  <div id="map-container">
    <!-- Placeholder for the user's map image -->
    <img id="world-map-bg" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/World_map_blank_without_borders.svg/1000px-World_map_blank_without_borders.svg.png" alt="World Map">
    <svg id="map"></svg>
  </div>

  <script>
    // 0: Neutral, 1: Player, 2-5: Bots
    const COLORS = {
      0: '#475569', // Slate 600
      1: '#3b82f6', // Blue 500
      2: '#ef4444', // Red 500
      3: '#10b981', // Emerald 500
      4: '#f59e0b', // Amber 500
      5: '#a855f7'  // Purple 500
    };

    // Node definitions (x, y are percentages)
    const nodesData = [
      { id: 'alaska', name: 'Alaska', x: 10, y: 25 },
      { id: 'canada', name: 'Kanada', x: 22, y: 25 },
      { id: 'usa', name: 'USA', x: 20, y: 38 },
      { id: 'mexico', name: 'Mexiko', x: 18, y: 48 },
      { id: 'colombia', name: 'Kolumbien', x: 25, y: 58 },
      { id: 'brazil', name: 'Brasilien', x: 32, y: 68 },
      { id: 'argentina', name: 'Argentinien', x: 28, y: 82 },
      { id: 'greenland', name: 'Grönland', x: 35, y: 15 },
      { id: 'uk', name: 'UK', x: 45, y: 30 },
      { id: 'france', name: 'Frankreich', x: 48, y: 35 },
      { id: 'spain', name: 'Spanien', x: 46, y: 40 },
      { id: 'germany', name: 'Deutschland', x: 51, y: 33 },
      { id: 'italy', name: 'Italien', x: 52, y: 38 },
      { id: 'scandinavia', name: 'Skandinavien', x: 52, y: 20 },
      { id: 'east_eu', name: 'Osteuropa', x: 56, y: 33 },
      { id: 'russia_w', name: 'Russland (W)', x: 65, y: 25 },
      { id: 'russia_e', name: 'Russland (O)', x: 80, y: 25 },
      { id: 'middle_east', name: 'Naher Osten', x: 60, y: 45 },
      { id: 'egypt', name: 'Ägypten', x: 55, y: 48 },
      { id: 'north_africa', name: 'Nordafrika', x: 48, y: 48 },
      { id: 'west_africa', name: 'Westafrika', x: 46, y: 58 },
      { id: 'congo', name: 'Kongo', x: 53, y: 63 },
      { id: 'east_africa', name: 'Ostafrika', x: 58, y: 58 },
      { id: 'south_africa', name: 'Südafrika', x: 55, y: 78 },
      { id: 'madagascar', name: 'Madagaskar', x: 62, y: 73 },
      { id: 'india', name: 'Indien', x: 70, y: 50 },
      { id: 'china', name: 'China', x: 78, y: 40 },
      { id: 'japan', name: 'Japan', x: 88, y: 40 },
      { id: 'se_asia', name: 'Südostasien', x: 80, y: 55 },
      { id: 'indonesia', name: 'Indonesien', x: 82, y: 65 },
      { id: 'australia', name: 'Australien', x: 85, y: 80 },
      { id: 'new_zealand', name: 'Neuseeland', x: 95, y: 88 }
    ];

    const edgesData = [
      ['alaska', 'canada'], ['canada', 'usa'], ['canada', 'greenland'],
      ['usa', 'mexico'], ['mexico', 'colombia'], ['colombia', 'brazil'],
      ['colombia', 'argentina'], ['brazil', 'argentina'], ['brazil', 'west_africa'],
      ['greenland', 'uk'], ['greenland', 'scandinavia'],
      ['uk', 'france'], ['uk', 'scandinavia'],
      ['france', 'spain'], ['france', 'germany'], ['france', 'italy'],
      ['spain', 'north_africa'],
      ['germany', 'italy'], ['germany', 'east_eu'], ['germany', 'scandinavia'],
      ['italy', 'north_africa'], ['italy', 'egypt'], ['italy', 'east_eu'],
      ['scandinavia', 'russia_w'],
      ['east_eu', 'russia_w'], ['east_eu', 'middle_east'],
      ['russia_w', 'russia_e'], ['russia_w', 'middle_east'],
      ['russia_e', 'china'], ['russia_e', 'japan'], ['russia_e', 'alaska'],
      ['middle_east', 'egypt'], ['middle_east', 'east_africa'], ['middle_east', 'india'],
      ['north_africa', 'egypt'], ['north_africa', 'west_africa'], ['north_africa', 'congo'],
      ['egypt', 'east_africa'],
      ['west_africa', 'congo'],
      ['congo', 'east_africa'], ['congo', 'south_africa'],
      ['east_africa', 'south_africa'], ['east_africa', 'madagascar'],
      ['south_africa', 'madagascar'],
      ['india', 'china'], ['india', 'se_asia'],
      ['china', 'se_asia'], ['china', 'japan'],
      ['se_asia', 'indonesia'],
      ['indonesia', 'australia'],
      ['australia', 'new_zealand']
    ];

    let nodes = {};
    let selectedId = null;
    let gameOver = false;
    const svg = document.getElementById('map');

    function init() {
      // Initialize nodes
      nodesData.forEach(n => {
        nodes[n.id] = {
          ...n,
          owner: 0,
          troops: Math.floor(Math.random() * 15) + 5,
          neighbors: []
        };
      });

      // Build adjacency list
      edgesData.forEach(([a, b]) => {
        if (nodes[a] && nodes[b]) {
          nodes[a].neighbors.push(b);
          nodes[b].neighbors.push(a);
        }
      });

      // Assign starting positions (1 Player, 4 Bots)
      const ids = Object.keys(nodes);
      for(let i = 0; i < 5; i++) {
        let id = ids[Math.floor(Math.random() * ids.length)];
        while(nodes[id].owner !== 0) {
          id = ids[Math.floor(Math.random() * ids.length)];
        }
        nodes[id].owner = i + 1;
        nodes[id].troops = 50;
      }

      render();
      updateStats();
      
      // Start game loops
      setInterval(produceTroops, 1000);
      setInterval(botLogic, 1000);
    }

    function getCoords(xPct, yPct) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      // Adjust coordinates to fit better in the center
      const x = (xPct / 100) * w;
      const y = (yPct / 100) * h;
      return { x, y };
    }

    function render() {
      svg.innerHTML = '';

      // Draw edges
      edgesData.forEach(([a, b]) => {
        const n1 = nodes[a];
        const n2 = nodes[b];
        if (!n1 || !n2) return;
        
        const c1 = getCoords(n1.x, n1.y);
        const c2 = getCoords(n2.x, n2.y);
        
        // Handle wrap-around for Alaska-Russia
        if (Math.abs(n1.x - n2.x) > 50) {
          // Draw two lines going off screen
          const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line1.setAttribute('x1', c1.x); line1.setAttribute('y1', c1.y);
          line1.setAttribute('x2', n1.x < 50 ? 0 : window.innerWidth); line1.setAttribute('y2', (c1.y + c2.y)/2);
          line1.setAttribute('class', 'edge');
          svg.appendChild(line1);

          const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line2.setAttribute('x1', c2.x); line2.setAttribute('y1', c2.y);
          line2.setAttribute('x2', n2.x < 50 ? 0 : window.innerWidth); line2.setAttribute('y2', (c1.y + c2.y)/2);
          line2.setAttribute('class', 'edge');
          svg.appendChild(line2);
          return;
        }

        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', c1.x);
        line.setAttribute('y1', c1.y);
        line.setAttribute('x2', c2.x);
        line.setAttribute('y2', c2.y);
        line.setAttribute('class', 'edge');
        svg.appendChild(line);
      });

      // Draw nodes
      Object.values(nodes).forEach(n => {
        const c = getCoords(n.x, n.y);
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', `node ${selectedId === n.id ? 'selected' : ''}`);
        g.setAttribute('transform', `translate(${c.x}, ${c.y})`);
        g.onclick = () => handleNodeClick(n.id);

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('r', 20);
        circle.setAttribute('fill', COLORS[n.owner]);
        g.appendChild(circle);

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('class', 'troop-text');
        text.textContent = Math.floor(n.troops);
        g.appendChild(text);

        const nameText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        nameText.setAttribute('class', 'name-text');
        nameText.setAttribute('y', 32);
        nameText.textContent = n.name;
        g.appendChild(nameText);

        svg.appendChild(g);
      });
    }

    function handleNodeClick(id) {
      if (gameOver) return;
      const node = nodes[id];

      if (selectedId) {
        if (selectedId === id) {
          selectedId = null; // Deselect
        } else {
          const source = nodes[selectedId];
          // Check if neighbors
          if (source.neighbors.includes(id)) {
            attack(selectedId, id);
          }
          selectedId = null;
        }
      } else {
        if (node.owner === 1) {
          selectedId = id;
        }
      }
      render();
    }

    function attack(sourceId, targetId) {
      const source = nodes[sourceId];
      const target = nodes[targetId];
      
      if (source.troops <= 1) return;

      const attackingTroops = source.troops - 1;
      source.troops = 1;

      if (source.owner === target.owner) {
        // Reinforce
        target.troops += attackingTroops;
      } else {
        // Attack
        if (attackingTroops > target.troops) {
          target.owner = source.owner;
          target.troops = attackingTroops - target.troops;
        } else {
          target.troops -= attackingTroops;
        }
      }
      updateStats();
      checkWinCondition();
    }

    function produceTroops() {
      if (gameOver) return;
      Object.values(nodes).forEach(n => {
        if (n.owner !== 0) {
          // Max 200 troops per territory
          if (n.troops < 200) {
            n.troops += 1;
          }
        }
      });
      render();
    }

    function botLogic() {
      if (gameOver) return;
      const bots = [2, 3, 4, 5];
      
      bots.forEach(botId => {
        const botNodes = Object.values(nodes).filter(n => n.owner === botId);
        if (botNodes.length === 0) return;

        botNodes.forEach(source => {
          if (source.troops > 15 && Math.random() > 0.5) {
            // Find valid targets (neighbors)
            const targets = source.neighbors.map(id => nodes[id]);
            
            // Prefer attacking weaker enemies or neutrals
            const enemies = targets.filter(t => t.owner !== botId && t.troops < source.troops - 1);
            
            if (enemies.length > 0) {
              const target = enemies[Math.floor(Math.random() * enemies.length)];
              attack(source.id, target.id);
            } else if (source.troops > 50) {
              // Reinforce random friendly neighbor
              const friends = targets.filter(t => t.owner === botId);
              if (friends.length > 0) {
                const target = friends[Math.floor(Math.random() * friends.length)];
                attack(source.id, target.id);
              }
            }
          }
        });
      });
      render();
    }

    function updateStats() {
      const playerNodes = Object.values(nodes).filter(n => n.owner === 1);
      const totalTroops = playerNodes.reduce((sum, n) => sum + Math.floor(n.troops), 0);
      document.getElementById('stats').innerText = `Länder: ${playerNodes.length} / ${Object.keys(nodes).length} | Truppen: ${totalTroops}`;
    }

    function checkWinCondition() {
      const totalNodes = Object.keys(nodes).length;
      const playerNodes = Object.values(nodes).filter(n => n.owner === 1).length;
      
      if (playerNodes === 0) {
        gameOver = true;
        document.getElementById('resultText').innerText = "Niederlage!";
        document.getElementById('resultText').style.color = "#ef4444";
        document.getElementById('gameover').style.display = "block";
      } else if (playerNodes >= totalNodes * 0.8) {
        gameOver = true;
        document.getElementById('resultText').innerText = "Weltmacht! Sieg!";
        document.getElementById('resultText').style.color = "#10b981";
        document.getElementById('gameover').style.display = "block";
      }
    }

    // Handle window resize
    window.addEventListener('resize', render);

    // Start game
    init();
  </script>
</body>
</html>
