<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#86198f" />
    </linearGradient>
    <linearGradient id="question" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8" />
      <stop offset="100%" stop-color="#fdf2f8" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" />

  <!-- A few chaotic shapes in the background -->
  <circle cx="40" cy="40" r="15" fill="#f43f5e" opacity="0.5" />
  <rect x="150" y="30" width="25" height="25" transform="rotate(25 162 42)" fill="#3b82f6" opacity="0.5" />
  <polygon points="170,160 140,180 180,190" fill="#10b981" opacity="0.5" />
  <path d="M 20 160 Q 40 140 60 160 T 100 160" fill="none" stroke="#eab308" stroke-width="6" opacity="0.5" stroke-linecap="round" />

  <!-- Big Question Mark -->
  <text x="100" y="145" font-family="sans-serif" font-weight="900" font-size="120" fill="url(#question)" text-anchor="middle" style="filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.6));">?</text>
</svg>
