<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="250" fill="url(#bg)" />
  
  <!-- Question Box -->
  <rect x="50" y="40" width="300" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#glow)" />
  <text x="200" y="75" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Quiz Time!</text>

  <!-- Answer Option 1 -->
  <rect x="50" y="120" width="140" height="40" rx="6" fill="#312e81" stroke="#8b5cf6" stroke-width="2" filter="url(#glow)" />
  <rect x="55" y="125" width="30" height="30" rx="4" fill="#8b5cf6" />
  <path d="M65 140 L70 145 L80 135" stroke="#ffffff" stroke-width="2" fill="none" />
  
  <!-- Answer Option 2 -->
  <rect x="210" y="120" width="140" height="40" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
  <rect x="215" y="125" width="30" height="30" rx="4" fill="#10b981" />

  <!-- Answer Option 3 -->
  <rect x="50" y="175" width="140" height="40" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" filter="url(#glow)" />
  <rect x="55" y="180" width="30" height="30" rx="4" fill="#ef4444" />

  <!-- Answer Option 4 -->
  <rect x="210" y="175" width="140" height="40" rx="6" fill="#713f12" stroke="#eab308" stroke-width="2" filter="url(#glow)" />
  <rect x="215" y="180" width="30" height="30" rx="4" fill="#eab308" />
  
</svg>
